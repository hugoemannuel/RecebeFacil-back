version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recebefacil-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: recebefacil
    ports:
      - "5432:5432"
    volumes:
      - recebefacil-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  recebefacil-pgdata:
